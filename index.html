<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Survivor Quebec Preparation Guide</title>
<!-- Load Tailwind CSS - FIXED LINK -->
<script src="https://www.google.com/url?sa=E&source=gmail&q=https://cdn.tailwindcss.com"></script>
<!-- Use Inter font family (Tailwind default) -->
<style>
/* -------------------------------------- /
/ --- GLOBAL & MINIMALIST BASE STYLES -- /
/ -------------------------------------- /
body {
font-family: 'Inter', sans-serif;
background-color: #fce3a7; / Sandy Background /
color: #2c2c2c; / Dark text */
transition: background-color 0.3s ease;
min-height: 100vh;
position: relative;
overflow-x: hidden;
}

    /* Specific dark mode for the 'Outwit' module */
    .dark-mode-module {
        background-color: #1c1c1c !important;
    }
    /* Style for the main content area in dark mode */
    .dark-mode-module #content-area {
        background-color: #2c2c2c;
        color: #f0f0f0;
        border-color: #4a4a4a;
    }
    /* Style for headers in dark mode */
    .dark-mode-module h1, .dark-mode-module h2 {
        color: #f7f3e8;
    }
    /* Standard Buttons */
    .primary-btn {
        background-color: #b45309;
        color: white;
        padding: 0.75rem 1.5rem;
        border-radius: 0.5rem;
        font-weight: 600;
        transition: background-color 0.2s;
    }
    .primary-btn:hover {
        background-color: #92400e;
    }
    /* Navigation Links */
    .nav-link.active {
        font-weight: 700;
        color: #b45309;
        border-bottom: 2px solid #b45309;
    }

    /* -------------------------------------- */
    /* --- HOME PAGE (SURVIVOR INTRO) CSS --- */
    /* -------------------------------------- */

    /* 1. Carved Title Effect */
    .carved-title {
        font-weight: 900;
        text-shadow: 
            3px 3px 0 #8b4513, /* Dark Wood Base */
            6px 6px 0 #5c300f, /* Deeper Engraving */
            9px 9px 0 #3c2009, /* Deepest Shadow */
            12px 12px 10px rgba(0, 0, 0, 0.5); /* Cast Shadow */
        color: #e0ac69; /* Light Wood Grain Color */
    }

    /* 2. Carved Button Look */
    .carved-btn {
        background-color: #a0522d; /* Sienna/Wood Color */
        color: #f7f3e8; /* Parchment Text */
        border: 4px solid #6c3f25; /* Darker Wood Border */
        font-weight: 700;
        text-shadow: 2px 2px 0 #6c3f25; /* Engraved Text */
        box-shadow: 
            0 6px 0 #6c3f25, /* Bottom Bevel */
            0 8px 15px rgba(0, 0, 0, 0.4); /* Lifted Shadow */
        transition: all 0.2s ease-in-out;
    }

    /* 3. Button Hover Effects */
    .carved-btn:hover {
        transform: translateY(-4px) scale(1.02);
        box-shadow: 
            0 10px 0 #6c3f25, 
            0 15px 25px rgba(255, 165, 0, 0.5); /* Orange/Torch Glow */
    }

    /* 4. Ambient Torch Flicker Keyframes */
    @keyframes torch-flicker {
        0%, 100% { box-shadow: 0 0 10px #ff9900, 0 0 15px #ff6600, 0 0 20px rgba(255, 102, 0, 0.7); opacity: 0.8; }
        50% { box-shadow: 0 0 8px #ff9900, 0 0 12px #ff6600, 0 0 18px rgba(255, 102, 0, 0.9); opacity: 1; }
    }

    /* 5. Ambient Shadow Sway Keyframes */
    @keyframes shadow-sway {
        0% { transform: rotate(0.5deg) translate(2px, 2px); }
        50% { transform: rotate(-0.5deg) translate(-2px, -2px); }
        100% { transform: rotate(0.5deg) translate(2px, 2px); }
    }

    /* Torch Glow Overlay (placed in corners for index page only) */
    #torch-glow-overlay {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        pointer-events: none;
        z-index: 0;
    }

    .torch-flicker {
        position: absolute;
        width: 100px;
        height: 100px;
        border-radius: 50%;
        opacity: 0.8;
        filter: blur(25px);
        animation: torch-flicker 2s infinite alternate;
    }

    .torch-flicker.top-left {
        top: 10%;
        left: 5%;
        background: radial-gradient(circle, #ffd700 0%, transparent 70%);
    }

    .torch-flicker.bottom-right {
        bottom: 10%;
        right: 5%;
        background: radial-gradient(circle, #ff6600 0%, transparent 70%);
        animation-delay: 0.5s;
    }
    
    /* Palm Shadow Overlay (simplified for minimalism) */
    #palm-shadow-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        opacity: 0.1;
        z-index: 0;
        background: 
            radial-gradient(circle at 10% 10%, rgba(0,0,0,0.5) 1%, transparent 30%),
            radial-gradient(circle at 90% 90%, rgba(0,0,0,0.5) 1%, transparent 30%);
        background-size: 50% 50%;
        animation: shadow-sway 10s infinite alternate ease-in-out;
    }
</style>


</head>
<body class="min-h-screen">

<!-- Ambient Overlays (Torch and Shadow) -->
<!-- These are only visible/active on the index page via JS check -->
<div id="palm-shadow-overlay" class="hidden"></div>
<div id="torch-glow-overlay" class="hidden">
    <div class="torch-flicker top-left"></div>
    <div class="torch-flicker bottom-right"></div>
</div>


<!-- Header / Navigation Bar -->
<header class="bg-amber-900 shadow-xl sticky top-0 z-20">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-16">
            <!-- Logo/Title -->
            <div class="flex-shrink-0">
                <a href="#index" class="text-xl font-extrabold tracking-wide text-white rounded-md p-2 hover:bg-amber-700 transition">
                    SURVIVOR QC GUIDE
                </a>
            </div>
            
            <!-- Desktop Navigation -->
            <nav class="hidden md:flex md:space-x-8" id="desktop-nav">

            </nav>

            <!-- Mobile Menu Button -->

                <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                </svg>
            </button>
        </div>
    </div>
    <!-- Mobile Menu (Hidden by default) -->
    <div id="mobile-menu" class="hidden md:hidden bg-amber-800 absolute w-full shadow-lg z-30">
        <nav class="pt-2 pb-3 space-y-1 sm:px-3" id="mobile-nav-links">
            <!-- Links populated by JS -->
        </nav>
    </div>
</header>

<!-- Main Content Area -->
<!-- The padding and background are slightly adjusted on the index page via JS for full theme immersion -->
<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 relative z-10">
    <div id="content-area" class="bg-stone-50 p-6 sm:p-10 lg:p-12 shadow-lg rounded-xl border border-stone-200 min-h-[70vh]">
        <!-- Content is injected here by JavaScript -->
    </div>
</main>

<!-- Footer for Navigation Controls -->
<footer class="bg-stone-100 border-t border-stone-200 mt-10 relative z-10">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
        <button id="prev-btn" class="primary-btn flex items-center space-x-2 disabled:opacity-50" disabled>
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            <span>Previous Phase</span>
        </button>

        <div id="current-page-info" class="text-sm text-gray-500 font-semibold hidden sm:block"></div>

        <button id="next-btn" class="primary-btn flex items-center space-x-2 disabled:opacity-50">
            <span>Next Phase</span>
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
        </button>
    </div>
</footer>

<script>
    // --- Core Application Data ---
    const PAGES = [
        { id: 'index', title: '0. Orientation' },
        // Module 1: Outwit
        { id: 'page1-1', title: '1.1. Rapport Weapon' },
        { id: 'page1-2', title: '1.2. The Numbers Game' },
        { id: 'page1-3', title: '1.3. Advantage Warfare' },
        { id: 'page1-4', title: '1.4. Chaos Theory' },
        // Module 2: Outplay
        { id: 'phase2-intro', title: '2.0. Outplay Introduction' },
        { id: 'page2-1', title: '2.1. Endurance & Grip' },
        { id: 'page2-2', title: '2.2. Puzzle Mastery' },
        { id: 'page2-3', title: '2.3. Camp Essentials' },
        // Module 3: Outlast
        { id: 'phase3-intro', title: '3.0. Outlast Introduction' },
        { id: 'page3-1', title: '3.1. Starvation Mindset' },
        { id: 'page3-2', title: '3.2. Psychological Hardening' },
        { id: 'page3-3', title: '3.3. Camp Health & Injury' },
        // Final Audit
        { id: 'final-audit', title: '4. Final Audit' },
    ];

    const PAGES_CONTENT = {
        // --- INDEX (Home Page - Launchpad / Survivor Intro) ---
        'index': `
            <div class="text-center py-20 min-h-[60vh] flex flex-col justify-center items-center">
                <h1 class="carved-title text-7xl sm:text-8xl md:text-9xl mb-16 tracking-tight font-extrabold select-none">
                    SURVIVOR
                </h1>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-8 w-full max-w-5xl">
                    <!-- Outwit Button -->
                    <a href="#page1-1" class="carved-btn flex flex-col items-center p-6 sm:p-8 rounded-xl min-h-[150px] justify-center text-center text-3xl sm:text-4xl">
                        MODULE I: OUTWIT
                    </a>

                    <!-- Outplay Button -->
                    <a href="#phase2-intro" class="carved-btn flex flex-col items-center p-6 sm:p-8 rounded-xl min-h-[150px] justify-center text-center text-3xl sm:text-4xl">
                        MODULE II: OUTPLAY
                    </a>

                    <!-- Outlast Button -->
                    <a href="#phase3-intro" class="carved-btn flex flex-col items-center p-6 sm:p-8 rounded-xl min-h-[150px] justify-center text-center text-3xl sm:text-4xl">
                        MODULE III: OUTLAST
                    </a>
                </div>
                <p class="text-lg text-gray-700 mt-16 max-w-3xl">
                    The ultimate guide to mastering the social, physical, and psychological elements of the game.
                </p>
            </div>
        `,
        // --- MODULE 1: OUTWIT (Dark Mode Aesthetic) ---

        // 1.1 Rapport Weapon
        'page1-1': `
            <h1 class="text-4xl font-extrabold mb-6">THE RAPPORT WEAPON: FORGE BONDS, FIND POWER</h1>
            <p class="text-lg text-gray-400 mb-8 border-b border-gray-600 pb-4">The foundation of winning isn't finding an Idol; it's finding an alliance that trusts you more than they trust themselves. This trust is built on authentic, personal connection. Mastery of this skill is how winners like Kim Spradlin and Parvati Shallow controlled entire seasons.</p>

            <!-- Two-Column Section -->
            <h2 class="text-2xl font-semibold text-amber-500 mb-4">1.1.1. The One-on-One Domination: The Kim & Parvati Playbook</h2>
            <div class="grid md:grid-cols-2 gap-8 text-gray-300">
                <div>
                    <h3 class="font-bold text-amber-600 mb-2">STRATEGY: Micro-Focus</h3>
                    <p>Stop thinking about the Final Six. Start thinking about the six individual relationships you need to win. Domination starts by making everyone feel like they have a unique, personal bond with you, not just a transactional alliance.</p>
                </div>
                <div class="tactical-box text-sm">
                    <h3 class="font-bold text-amber-600 mb-2">CASE STUDY: Personalized Control</h3>
                    <p>Review how Kim Spradlin and Parvati Shallow mastered the art of relating to every individual player, which gave them seamless, easy control of the game without ever appearing overtly dominant.</p>
                </div>
            </div>

            <hr class="my-8 border-gray-700">

            <h2 class="text-2xl font-semibold text-amber-500 mb-4">1.1.2. Silent Signals: Mastering the Language of Trust</h2>
            <div class="tactical-box text-gray-300">
                <h3 class="font-extrabold text-3xl text-red-500 mb-4">TACTICAL CUES: Non-Verbal Compliance</h3>
                <p class="mb-4">Your body speaks louder than your lies. Research proves that up to 93% of communication is non-verbal. Use these cues to broadcast safety and loyalty:</p>
                <ul class="list-disc list-inside space-y-2 ml-4">
                    <li><strong>Open Posture:</strong> Always keep your arms uncrossed to avoid erecting physical or mental barriers.</li>
                    <li><strong>Level the Field:</strong> Avoid sitting or standing higher than your ally; maintaining the same physical level eliminates indicators of dominance.</li>
                    <li><strong>Constant Validation:</strong> Use frequent, subtle nodding and genuine smiles to signal active listening. People remember how you made them feel, not what you said.</li>
                </ul>
            </div>

            <h2 class="text-2xl font-semibold text-amber-500 mt-8 mb-4">1.1.3. The Tactical Tear: Using Honesty to Harvest Information</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 text-gray-300">
                <div class="flow-step bg-red-800/30 text-white border-red-500">
                    <p class="font-bold text-lg mb-1">STEP 1: Share a Struggle</p>
                    <p class="text-sm">Share a genuine, minor vulnerability about your life or background (never your strategic intent).</p>
                </div>
                <div class="flow-step bg-red-800/30 text-white border-red-500">
                    <p class="font-bold text-lg mb-1">STEP 2: Build Safety</p>
                    <p class="text-sm">This mutual vulnerability creates a powerful, non-game bond, making allies feel safe and seen.</p>
                </div>
                <div class="flow-step bg-red-800/30 text-white border-red-500">
                    <p class="font-bold text-lg mb-1">STEP 3: Harvest Data</p>
                    <p class="text-sm">The ally reciprocates by sharing their strategic fears and alliances, giving you crucial intelligence.</p>
                </div>
            </div>
        `,

        // 1.2 The Numbers Game
        'page1-2': `
            <h1 class="text-4xl font-extrabold mb-6">VFB: THE NUMBERS GAME: THE 80% RULE FOR STRATEGIC SUCCESS</h1>
            <p class="text-lg text-gray-400 mb-8 border-b border-gray-600 pb-4">Forget the highlight reel. The single most important statistical factor for a winner is Votes For Boot (VFB): how often you voted correctly. This is empirical proof of your influence and inclusion.</p>

            <h2 class="text-2xl font-semibold text-amber-500 mb-4">1.2.1. The 80% Rule: Why Voting Correctly is the Only Stat That Matters</h2>
            <div class="flex justify-center my-8">
                <div class="w-full max-w-md p-8 text-center border-4 border-amber-500 rounded-full bg-red-900/50 shadow-2xl">
                    <p class="text-6xl font-extrabold text-amber-300">80% +</p>
                    <p class="text-xl text-gray-200 mt-2">VFB HIT RATE TARGET</p>
                    <p class="text-sm text-gray-400 mt-4">If you consistently fail to vote with the majority, you are cluelessly outside the majority and will be eliminated. VFB proves you were in the know—the surest sign of a healthy social game.</p>
                </div>
            </div>

            <h2 class="text-2xl font-semibold text-amber-500 mt-8 mb-4">1.2.2. Follower or Kingpin? Earning Your V-Rating</h2>
            <div class="overflow-x-auto text-gray-300">
                <table class="min-w-full divide-y divide-gray-700 rounded-lg overflow-hidden">
                    <thead class="bg-amber-900">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium uppercase tracking-wider text-amber-200">Archetype</th>
                            <th class="px-6 py-3 text-left text-xs font-medium uppercase tracking-wider text-amber-200">How VFB is Achieved</th>
                            <th class="px-6 py-3 text-left text-xs font-medium uppercase tracking-wider text-amber-200">Jury Perception Risk</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-700 bg-gray-800">
                        <tr>
                            <td class="px-6 py-4 whitespace-nowrap font-bold text-amber-500">The Kingpin</td>
                            <td class="px-6 py-4">Sets the target, manages votes, and dictates the outcome (the Kim Spradlin model). High ownership of the narrative.</td>
                            <td class="px-6 py-4 text-green-400">Low Risk - High Claim</td>
                        </tr>
                        <tr>
                            <td class="px-6 py-4 whitespace-nowrap font-bold text-gray-400">The Follower</td>
                            <td class="px-6 py-4">Achieves high VFB by simply being told who to vote for and agreeing. No ownership or agency.</td>
                            <td class="px-6 py-4 text-red-400">High Risk - No Claim</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <h2 class="text-2xl font-semibold text-amber-500 mt-8 mb-4">1.2.3. The Ghost Strategy: Be in the Know, Not on the Screen</h2>
            <div class="tactical-box text-gray-300">
                <h3 class="font-extrabold text-xl text-amber-600 mb-2">OPERATIONAL DIRECTIVE: Strategic Invisibility</h3>
                <p>During the chaotic pre-merge, your goal is strategic invisibility. Your VFB must be high, proving you have influence, but your name should not be constantly whispered as the primary mastermind. You must be retained as a necessary asset whose vote is reliable, not as the strategic leader who needs to be clipped.</p>
            </div>
        `,

        // 1.3 Advantage Warfare
        'page1-3': `
            <h1 class="text-4xl font-extrabold mb-6">ADVANTAGE WARFARE: HOW TO HUNT, FLUSH, AND DEFEND</h1>
            <p class="text-lg text-gray-400 mb-8 border-b border-gray-600 pb-4">Idols, Nullifiers, and Twists are the game's new currency. Mastery means treating every vote like a high-stakes auction where you anticipate every counter-bid.</p>

            <h2 class="text-2xl font-semibold text-amber-500 mb-4">1.3.1. The Original Power Move: The Safe Vote Execution</h2>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 text-gray-300">
                <div class="flow-step bg-gray-700/50 text-white border-gray-500">
                    <p class="font-bold text-lg mb-1">STEP 1: Vote Split</p>
                    <p class="text-sm">Majority splits votes (e.g., Target A and Target B).</p>
                </div>
                <div class="flow-step bg-gray-700/50 text-white border-gray-500">
                    <p class="font-bold text-lg mb-1">STEP 2: Idol Play</p>
                    <p class="text-sm">Target A plays their Idol. All votes on A are negated.</p>
                </div>
                <div class="flow-step bg-gray-700/50 text-white border-gray-500">
                    <p class="font-bold text-lg mb-1">STEP 3: Revote Union</p>
                    <p class="text-sm">On the revote, the majority unites on Target B (who did not receive votes originally).</p>
                </div>
                <div class="flow-step bg-gray-700/50 text-white border-gray-500">
                    <p class="font-bold text-lg mb-1">RESULT: Idol Burned</p>
                    <p class="text-sm">Idol is burned, and a member of the opposition is eliminated successfully.</p>
                </div>
            </div>

            <h2 class="text-2xl font-semibold text-amber-500 mt-8 mb-4">1.3.2. The Double-Cross: Manipulating a Player into Burning Their Idol</h2>
            <div class="tactical-box text-gray-300">
                <h3 class="font-extrabold text-xl text-red-500 mb-2">MANIPULATOR'S CHECKLIST: Idol Flush Protocol</h3>
                <ol class="list-decimal list-inside space-y-2 ml-4">
                    <li><strong>Select Target:</strong> Choose a non-threat with a rumored Idol.</li>
                    <li><strong>False Safety:</strong> Convince them they are the imminent target, but make them feel "as safe as possible" to ensure they play the Idol unnecessarily.</li>
                    <li><strong>Execute:</strong> Vote out the true target (who has the Idol). Successfully flushing an idol is an instant FTC Resume Item.</li>
                </ol>
            </div>

            <h2 class="text-2xl font-semibold text-amber-500 mt-8 mb-4">1.3.4. Surgical Strike: The Multi-Target Blindside</h2>
            <div class="tactical-box text-gray-300">
                <h3 class="font-extrabold text-xl text-amber-600 mb-2">CASE STUDY: Rob Mariano's Matt Blindside (Redemption Island)</h3>
                <p>The best strategic moves solve multiple problems. Rob's move didn't just eliminate a personal threat; it also flushed a rumored Idol, cut a relationship, and solidified his alliance's absolute numerical control. Every blindside must achieve at least three strategic objectives.</p>
            </div>
        `,

        // 1.4 Chaos Theory
        'page1-4': `
            <h1 class="text-4xl font-extrabold mb-6">CHAOS THEORY: SURVIVING THE QUÉBEC QUAKE</h1>
            <p class="text-lg text-gray-400 mb-8 border-b border-gray-600 pb-4">The Survivor Québec production model is designed for structural instability. Your alliances are temporary; your adaptability must be permanent. Rigid loyalty is a high-risk liability.</p>

            <h2 class="text-2xl font-semibold text-amber-500 mb-4">1.4.1. Twist Inventory: What Survivor Québec Will Throw at You</h2>
            <div class="tactical-box text-gray-300">
                <h3 class="font-extrabold text-xl text-red-500 mb-2">DISRUPTIVE MECHANICS</h3>
                <p class="mb-2">Prepare for game mechanics engineered to shatter long-term planning:</p>
                <ul class="list-disc list-inside space-y-1 ml-4">
                    <li>Tribe Vote Steals</li>
                    <li>Forced Duos (picking rocks before challenges)</li>
                    <li>Non-Elimination Rounds followed by immediate vote-outs.</li>
                </ul>
                <p class="text-sm mt-3 italic text-gray-400">This high velocity of chaos demands that you constantly be ready to shift strategy.</p>
            </div>

            <h2 class="text-2xl font-semibold text-amber-500 mt-8 mb-4">1.4.2. Rent-a-Vote: Prioritizing Self-Interest over Loyalty</h2>
            <div class="tactical-box text-gray-300">
                <h3 class="font-extrabold text-xl text-amber-600 mb-2">STRATEGIC PRINCIPLE: The Utility Ally</h3>
                <p>When the game is unstable, the only constant is self-preservation. Be a <strong>Rent-a-Vote</strong> ally: prioritize immediate utility and self-preservation. Be ready to break alliances the moment they pass their strategic expiration date to ensure your survival.</p>
            </div>

            <h2 class="text-2xl font-semibold text-amber-500 mt-8 mb-4">1.4.3. The Queen's Rule: "Anyone, As Long As It Ain't Me"</h2>
            <div class="tactical-box text-gray-300">
                <h3 class="font-extrabold text-xl text-red-500 mb-2">FEATURED QUOTE (Sandra Diaz-Twine)</h3>
                <p class="text-lg italic mb-3">"Anyone, as long as it ain't me."</p>
                <p class="text-sm">Internalize the two-time winner's ethos. This provides the necessary defensive ruthlessness. It legitimizes aligning with the opposition if it guarantees your safety and ensures you are never the person who becomes expendable.</p>
            </div>
        `,

        // --- MODULE 2: OUTPLAY (Light Mode Aesthetic - Intro) ---
        'phase2-intro': `
            <h1 class="text-5xl font-extrabold text-amber-700 mb-6 border-b-4 border-amber-500 pb-2">MODULE II: OUTPLAY INTRODUCTION</h1>
            <p class="text-xl text-gray-700 mb-6">The challenges are not just for immunity; they are social currency. This module ensures you have the physical, cognitive, and technical skills to always be perceived as an indispensable asset.</p>
            <div class="grid md:grid-cols-2 gap-6 mt-6">
                <div>
                    <h2 class="text-2xl font-semibold text-amber-800 mb-3">Pillar Goal: Reliable Utility</h2>
                    <p class="text-gray-700">You must be capable in all three challenge categories (Endurance, Puzzles, Technical) to prevent your allies from viewing you as a liability in the post-merge phase. Your reliability keeps your name off the voting block.</p>
                </div>

    // --- Core Application Logic ---

    const contentArea = document.getElementById('content-area');

    const mobileNav = document.getElementById('mobile-nav-links');
    const mobileMenuButton = document.getElementById('mobile-menu-button');
    const mobileMenu = document.getElementById('mobile-menu');
    const palmShadowOverlay = document.getElementById('palm-shadow-overlay');
    const torchGlowOverlay = document.getElementById('torch-glow-overlay');
    const mainElement = document.querySelector('main');

    // Toggle mobile menu visibility
    mobileMenuButton.addEventListener('click', () => {
        mobileMenu.classList.toggle('hidden');
    });

    // Function to find the index of the current page in the PAGES array
    const getCurrentPageIndex = (pageId) => PAGES.findIndex(page => page.id === pageId);

    // Function to apply aesthetic changes based on the current module
    const applyAesthetic = (pageId) => {
        const isOutwitModule = pageId.startsWith('page1-');
        const isIndexPage = pageId === 'index';

        // 1. Dark Mode Toggle (for Outwit)
        if (isOutwitModule) {
            document.body.classList.add('dark-mode-module');
        } else {
            document.body.classList.remove('dark-mode-module');
        }

        // 2. Index Page Theme (Sand and Overlays)
        if (isIndexPage) {
            // Ensure main content area is transparent to show body background
            contentArea.classList.remove('bg-stone-50', 'p-6', 'sm:p-10', 'lg:p-12', 'shadow-lg', 'rounded-xl', 'border', 'border-stone-200');
            
            // Show ambient overlays
            palmShadowOverlay.classList.remove('hidden');
            torchGlowOverlay.classList.remove('hidden');
            
        } else {
            // Re-apply standard content area styling for reading modules
            contentArea.classList.add('bg-stone-50', 'p-6', 'sm:p-10', 'lg:p-12', 'shadow-lg', 'rounded-xl', 'border', 'border-stone-200');

            // Hide ambient overlays
            palmShadowOverlay.classList.add('hidden');
            torchGlowOverlay.classList.add('hidden');
        }
        
        // Close mobile menu on page load
        mobileMenu.classList.add('hidden');
    };

    // Function to load content and update UI
    const loadPageById = (pageId) => {
        const pageIndex = getCurrentPageIndex(pageId);

        if (pageIndex === -1) {
            // If page doesn't exist, default to index
            pageId = PAGES[0].id;
        }

        // Apply module-specific aesthetic (dark mode, index theme, etc.)
        applyAesthetic(pageId);

        // Inject content
        contentArea.innerHTML = PAGES_CONTENT[pageId] || '<h1 class="text-red-500">Content Not Found</h1>';
        window.location.hash = pageId;

        // Update navigation and control buttons
        updateNavigation(pageId);
        updateControlButtons(pageId);
    };

    // Function to update the Previous/Next buttons
    const updateControlButtons = (pageId) => {
        const pageIndex = getCurrentPageIndex(pageId);

        // Previous Button logic
        if (pageIndex > 0) {
            prevBtn.disabled = false;
            prevBtn.onclick = () => loadPageById(PAGES[pageIndex - 1].id);
        } else {
            prevBtn.disabled = true;
            prevBtn.onclick = null;
        }

        // Next Button logic
        if (pageIndex < PAGES.length - 1) {
            nextBtn.disabled = false;
            nextBtn.onclick = () => loadPageById(PAGES[pageIndex + 1].id);
        } else {
            nextBtn.disabled = true;
            nextBtn.onclick = null;
        }

        // Update current page display in footer
        const info = document.getElementById('current-page-info');
        info.textContent = PAGES[pageIndex].title;

        // Hide controls on the launchpad (index) page
        const hideControls = pageId === 'index';
        prevBtn.classList.toggle('hidden', hideControls);
        nextBtn.classList.toggle('hidden', hideControls);
        info.classList.toggle('hidden', hideControls);
        document.getElementById('mobile-menu-button').classList.toggle('hidden', hideControls);
    };

    // Function to populate and update navigation links
    const updateNavigation = (currentPageId) => {
        const navHtml = PAGES.map(page => {
            if (page.id === 'index') return ''; // Skip index page in main nav bar

            const isActive = page.id === currentPageId;
            const linkClass = isActive
                ? 'nav-link active text-amber-500 font-semibold'
                : 'nav-link text-white hover:text-amber-300 transition';

            return `<a href="#${page.id}" class="${linkClass} px-3 py-2 rounded-md text-sm font-medium whitespace-nowrap">${page.title}</a>`;
        }).join('');

        // Desktop Nav
        desktopNav.innerHTML = navHtml;

        // Mobile Nav (using slightly larger font)
        mobileNav.innerHTML = PAGES.map(page => {
            const isActive = page.id === currentPageId;
            const linkClass = isActive
                ? 'nav-link active text-amber-500 font-bold'
                : 'nav-link text-white hover:bg-amber-700 block px-3 py-2 rounded-md';

            return `<a href="#${page.id}" class="${linkClass} text-base" onclick="document.getElementById('mobile-menu').classList.add('hidden')">${page.title}</a>`;
        }).join('');
    };

    // Router initialization
    const handleHashChange = () => {
        const pageId = window.location.hash.substring(1) || PAGES[0].id;
        loadPageById(pageId);
    };

    // Event listeners
    window.addEventListener('hashchange', handleHashChange);
    window.addEventListener('load', handleHashChange);

</script>
