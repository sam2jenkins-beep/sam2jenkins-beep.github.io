<style>
/* -------------------------------------- /
/ --- EXPEDITIONARY / ORGANIC AESTHETIC --- /
/ -------------------------------------- /
:root {
    --color-base: #f7f3e8; /* Off-White Paper / Canvas */
    --color-dark: #2c3e50; /* Deep Slate / Ink */
    --color-accent: #a35515; /* Earthy Wood / Leather Brown */
    --color-neutral: #c3baa3; /* Aged Paper / Sand */
}

/* Base Style: Hand-Drawn, Organic Look */
body {
    font-family: 'Georgia', serif; /* Rugged serif for body */
    background-color: var(--color-base);
    color: var(--color-dark);
    min-height: 100vh;
    line-height: 1.6;
    /* Subtle paper texture */
    background-image: repeating-linear-gradient(-45deg, rgba(255,255,255,0.05), rgba(255,255,255,0.05) 1px, transparent 1px, transparent 2px);
}

/* TYPOGRAPHY: Elite Manual Tone */
h1, h2, h3 {
    font-family: 'Oswald', sans-serif; /* Strong, compressed header */
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.2;
    margin-bottom: 0.8rem;
}
h1 { font-size: 2.8rem; }
h2 { font-size: 1.8rem; }
.text-body { font-family: 'Roboto', sans-serif; line-height: 1.7; }
li { line-height: 1.5; }

/* LAYOUT & COMPOSITION: Softer, Bordered Look */
.content-area-main {
    background-color: var(--color-base);
    border: 3px solid var(--color-dark);
    border-radius: 8px;
    box-shadow: 6px 6px 0px var(--color-neutral); /* Soft lift */
    transition: box-shadow 0.3s ease;
    padding: 2.5rem;
}

/* Header Theming: Aged Leather */
header {
    background-color: var(--color-dark) !important; 
    border-bottom: 3px solid var(--color-accent);
}
#mobile-menu-button {
    color: var(--color-base) !important;
}

/* Navigation & Buttons: Leather and Ink */
.primary-btn {

    font-weight: 700;
    border: 1px solid var(--color-accent);

    box-shadow: 2px 2px 0px var(--color-dark);
}
.primary-btn:hover {
    background-color: var(--color-dark);
    border-color: var(--color-dark);
    color: var(--color-base);
    box-shadow: 4px 4px 0px var(--color-accent);

}
.nav-link.active {
    font-weight: 800;
    color: var(--color-accent);
    border-bottom: 3px solid var(--color-accent);
}

/* -------------------------------------- */
/* --- HOME PAGE (EXPEDITION LAUNCHPAD) --- */
/* -------------------------------------- */

.intro-title {
    font-family: 'Inter', sans-serif; /* Extremely bold font for logo */
    font-size: clamp(3rem, 10vw, 7rem);
    font-weight: 900;
    line-height: 1.0;
    color: var(--color-dark);
    text-shadow: 2px 2px 0 var(--color-neutral);
}

/* Thematic Block - Map Section Look */
.thematic-block {
    background-color: var(--color-base);
    color: var(--color-dark);
    border: 2px dashed var(--color-accent); /* Dashed/Sketchy Border */
    padding: 2rem;
    box-shadow: 3px 3px 0px var(--color-neutral);
    transition: all 0.2s ease-in-out;
    border-radius: 6px;
    font-family: 'Oswald', sans-serif;
}

/* Block Hover Effects */
.thematic-block:hover {
    transform: translate(-2px, -2px);
    box-shadow: 5px 5px 0px var(--color-accent);
    color: var(--color-accent);
    border-color: var(--color-dark);
}

/* Intentional Asymmetry on Index Page */
.asymmetric-grid {
    grid-template-columns: 1fr 1fr 1fr;
}
@media (min-width: 768px) {
    .asymmetric-grid {
        grid-template-columns: 2fr 4fr 3fr; 
    }
}

/* Dark Mode Module (Outwit) - Sketchbook/Charcoal */
.dark-mode-module {
    background-color: #384f64 !important; /* Darker Slate Blue */
}
.dark-mode-module #content-area {
    background-color: #384f64;
    color: var(--color-base);
    border-color: #5d758c;
    box-shadow: 6px 6px 0px var(--color-dark);
}
.dark-mode-module h1, .dark-mode-module h2, .dark-mode-module h3 {
    color: var(--color-base);
}
.dark-mode-module p, .dark-mode-module li, .dark-mode-module .text-gray-700 {
    color: #c3baa3; /* Lighter text color */
}
.dark-mode-module .text-amber-500, .dark-mode-module .text-amber-600 {
    color: #ffcc99; /* Brighter accent in dark mode */
}
.dark-mode-module .border-b-4, .dark-mode-module .border-b {

.timeline-active body {

}
.timeline-active h1, .timeline-active h2, .timeline-active h3, .timeline-active .header-font { 
    font-family: 'Oswald', sans-serif !important;

/* Revert main content area background to transparent for full page timeline effect */
.timeline-active #content-area {
    background-color: transparent !important;
    border: none !important;
    box-shadow: none !important;
    padding: 0 !important;
}

/* Timeline specific line/dot positioning */
.timeline-line {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    width: 4px;
    height: 100%;
    background-color: #cbd5e1;
    z-index: 0;
}
@media (max-width: 768px) {
    .timeline-line { left: 20px; }
    .timeline-content { margin-left: 40px; }
    .timeline-dot { left: 12px !important; }
}

/* Decision Tree Styling */
.decision-node {
    border: 2px solid #a35515;
    background-color: #fff8e1;
    transition: all 0.2s;
}
.decision-node:hover {
    box-shadow: 0 4px 6px rgba(163, 85, 21, 0.3);
}

</style>

        // --- 4. FINAL AUDIT (FTC Resume Builder) ---
        'final-audit': `

    // --- Core Application Logic ---

    const contentArea = document.getElementById('content-area');
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');
    const desktopNav = document.getElementById('desktop-nav');
    const mobileNav = document.getElementById('mobile-nav-links');
    const mobileMenuButton = document.getElementById('mobile-menu-button');
    const mobileMenu = document.getElementById('mobile-menu');
    
    // Toggle mobile menu visibility
    mobileMenuButton.addEventListener('click', () => {
        mobileMenu.classList.toggle('hidden');
    });

    // Function to find the index of the current page in the PAGES array
    const getCurrentPageIndex = (pageId) => PAGES.findIndex(page => page.id === pageId);

    // Function to apply aesthetic changes based on the current module
    const applyAesthetic = (pageId) => {
        const isOutwitModule = pageId.startsWith('page1-');
        const isIndexPage = pageId === 'index';
        const isTimelinePage = pageId === 'meta-analysis';

        // 1. Dark Mode Toggle (for Outwit)
        if (isOutwitModule) {
            document.body.classList.add('dark-mode-module');
        } else {
            document.body.classList.remove('dark-mode-module');
        }

        // 2. Timeline Page (Switches to the Timeline's external, clean aesthetic)
        if (isTimelinePage) {
            document.body.classList.add('timeline-active');
            contentArea.classList.remove('content-area-main'); // Remove main content block styling
        } else {
            document.body.classList.remove('timeline-active');
        }


        // 3. Index Page Theme (Removing content box styling for raw look)
        if (isIndexPage) {
            // Remove standard block styling for the 'broken grid' home page look
            contentArea.classList.remove('content-area-main', 'shadow-lg', 'border', 'border-stone-200', 'p-6', 'sm:p-10', 'lg:p-12');
            contentArea.classList.add('bg-transparent'); 
            
        } else if (!isTimelinePage) {
            // Re-apply standard content area styling for reading modules (modular block look)
            contentArea.classList.add('content-area-main');
            contentArea.classList.remove('bg-transparent');
        }
        
        // Close mobile menu on page load
        mobileMenu.classList.add('hidden');
    };

    // Function to load content and update UI
    const loadPageById = (pageId) => {
        const pageIndex = getCurrentPageIndex(pageId);

        if (pageIndex === -1) {
            // If page doesn't exist, default to index
            pageId = PAGES[0].id;
        }

        // Apply module-specific aesthetic (dark mode, index theme, etc.)
        applyAesthetic(pageId);

        // Inject content
        contentArea.innerHTML = PAGES_CONTENT[pageId] || '<h1 class="text-red-500">Content Not Found</h1>';
        window.location.hash = pageId;

        // Update navigation and control buttons
        updateNavigation(pageId);
        updateControlButtons(pageId);
    };

    // Function to update the Previous/Next buttons
    const updateControlButtons = (pageId) => {
        const pageIndex = getCurrentPageIndex(pageId);

        // Previous Button logic
        if (pageIndex > 0) {
            prevBtn.disabled = false;
            prevBtn.onclick = () => loadPageById(PAGES[pageIndex - 1].id);
        } else {
            prevBtn.disabled = true;
            prevBtn.onclick = null;
        }

        // Next Button logic
        if (pageIndex < PAGES.length - 1) {
            nextBtn.disabled = false;
            nextBtn.onclick = () => loadPageById(PAGES[pageIndex + 1].id);
        } else {
            nextBtn.disabled = true;
            nextBtn.onclick = null;
        }

        // Update current page display in footer
        const info = document.getElementById('current-page-info');
        info.textContent = PAGES[pageIndex].title;

        // Hide controls on the launchpad (index) page
        const hideControls = pageId === 'index';
        prevBtn.classList.toggle('hidden', hideControls);
        nextBtn.classList.toggle('hidden', hideControls);
        info.classList.toggle('hidden', hideControls);
        document.getElementById('mobile-menu-button').classList.toggle('hidden', hideControls);
    };

    // Function to populate and update navigation links
    const updateNavigation = (currentPageId) => {
        const navHtml = PAGES.map(page => {
            if (page.id === 'index') return ''; // Skip index page in main nav bar

            // Navigation links are simple white text in the dark header
            const linkColor = 'text-white hover:text-gray-400';

            const isActive = page.id === currentPageId;
            const linkClass = isActive
                ? 'nav-link active font-semibold' // Active style handled by CSS variable
                : `nav-link ${linkColor} transition`;

            return `<a href="#${page.id}" class="${linkClass} px-3 py-2 text-sm font-medium whitespace-nowrap">${page.title}</a>`;
        }).join('');

        // Desktop Nav
        desktopNav.innerHTML = navHtml;

        // Mobile Nav
        mobileNav.innerHTML = PAGES.map(page => {
            const isActive = page.id === currentPageId;
            const linkClass = isActive
                ? 'nav-link active font-bold'
                : 'nav-link text-white hover:bg-gray-700 block px-3 py-2';

            return `<a href="#${page.id}" class="${linkClass} text-base" onclick="document.getElementById('mobile-menu').classList.add('hidden')">${page.title}</a>`;
        }).join('');
    };

    // Router initialization
    const handleHashChange = () => {
        const pageId = window.location.hash.substring(1) || PAGES[0].id;
        loadPageById(pageId);
        // Scroll to top when page loads to ensure correct viewing
        window.scrollTo(0, 0); 
    };

    // Event listeners
    window.addEventListener('hashchange', handleHashChange);
    window.addEventListener('load', handleHashChange);

</script>
